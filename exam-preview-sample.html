<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Califica - Vista Previa de Evaluacion</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--orange-700:#D14B4C;--orange-600:#E85455;--orange-500:#FF6768;--orange-400:#FF8080;--orange-300:#FF9D9D;--orange-200:#FFBABA;--orange-100:#FFD1D1;--blue-700:#2F4060;--blue-600:#3C527A;--blue-500:#486394;--blue-300:#4F9AF2;--blue-200:#66ADFF;--blue-100:#888DFB;--neutral-900:#1F1F1F;--neutral-800:#383838;--neutral-700:#4C4C4C;--neutral-600:#616161;--neutral-500:#7D7D7D;--neutral-400:#999999;--neutral-300:#BFBFBF;--neutral-200:#D9D9D9;--neutral-100:#EDEDED;--neutral-000:#FFFFFF;--success-500:#0EA149;--success-300:#11C95B;--warning-500:#DEA528;--warning-300:#FFBD2E;--error-300:#FF2A1B;--yellow-100:#FFF0BF;--yellow-200:#FFE9A1;--baby-blue-100:#C9E6FF;--green-100:#D0FF98;--green-200:#A3C877;--pink-100:#FFBFDA;--bg-page:#F9F7F4;--bg-card:#FFFFFF;--bg-section-bar:#F5F3F0;--text-primary:#1F1F1F;--text-body:#4C4C4C;--text-secondary:#7D7D7D;--text-muted:#999999;--border-default:#EDEDED;--border-input:#D9D9D9;--border-active:#4F9AF2;--btn-primary:#FF8080;--btn-primary-hover:#FF6768;--btn-primary-pressed:#E85455;--space-xs:8px;--space-s:16px;--space-m:24px;--space-l:32px;--space-xl:40px;--radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--radius-full:50%;--shadow-sm:0 1px 3px rgba(0,0,0,0.06);--shadow-md:0 2px 10px rgba(0,0,0,0.08);--shadow-lg:0 4px 20px rgba(0,0,0,0.10)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg-page);color:var(--text-body);min-height:100vh;-webkit-font-smoothing:antialiased}
.page-container{max-width:820px;margin:0 auto;padding:var(--space-m) 20px var(--space-m)}
.exam-header-card{background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:var(--space-s);box-shadow:var(--shadow-sm)}
.exam-header-top{background:var(--orange-100);padding:20px 28px;border-bottom:1px solid var(--border-default);position:relative}
.exam-header-top::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--orange-500)}
.exam-title{font-size:20px;font-weight:800;color:var(--text-primary);margin-bottom:4px;line-height:24px}
.exam-subtitle{font-size:13px;color:var(--text-secondary);font-weight:500}
.exam-meta-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-bottom:1px solid var(--border-default)}
.meta-cell{padding:12px 20px;border-right:1px solid var(--border-default);text-align:center}
.meta-cell:last-child{border-right:none}
.meta-cell-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.meta-cell-value{font-size:14px;font-weight:800;color:var(--text-primary)}
.exam-instructions-bar{padding:14px 28px;background:var(--yellow-100);border-top:1px solid var(--border-default);font-size:13px;font-weight:500;color:#6D5D1B;line-height:1.55;display:flex;align-items:flex-start;gap:10px}
.exam-instructions-bar svg{width:16px;height:16px;flex-shrink:0;margin-top:2px;color:var(--warning-500)}
.exam-instructions-bar strong{font-weight:800}
.section-card{background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);margin-bottom:var(--space-s);overflow:hidden;box-shadow:var(--shadow-sm)}
.section-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg-section-bar);border-bottom:1px solid var(--border-default);font-size:13px;color:var(--text-secondary);font-weight:600}
.section-content{padding:var(--space-m) 28px}
.section-title{font-size:22px;font-weight:800;color:var(--orange-500);margin-bottom:var(--space-s);line-height:24px}
.section-instructions{margin-bottom:20px}
.section-instructions-label{font-size:14px;font-weight:800;color:var(--text-primary);margin-bottom:6px}
.section-instructions-text{font-size:14px;font-weight:500;color:var(--text-body);line-height:1.6}
.section-divider{font-size:14px;font-weight:800;color:var(--text-primary);margin-bottom:var(--space-s);margin-top:var(--space-xs)}
.question-item{margin-bottom:var(--space-s);padding:var(--space-s) 18px;border-radius:var(--radius-md);transition:all .15s;position:relative;border:1.5px solid transparent}
.question-item:hover{background:#FDFCFA;border-color:var(--border-default)}
.question-row{display:flex;align-items:flex-start;gap:4px}
.question-number-text{font-size:15px;font-weight:800;color:var(--text-primary);white-space:nowrap;min-width:28px}
.question-text{font-size:15px;font-weight:500;line-height:1.55;color:var(--text-primary);flex:1}
.mc-options-list{margin-top:10px;margin-left:28px}
.mc-option-row{display:flex;align-items:center;gap:var(--space-xs);padding:7px 12px;margin-bottom:4px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;color:var(--text-body);transition:background .1s}
.mc-option-row.correct{background:#E8F5E9}
.mc-option-letter{font-weight:700;color:var(--text-secondary);min-width:18px}
.mc-option-row.correct .mc-option-letter{color:var(--success-500)}
.mc-correct-tag{margin-left:auto;font-size:11px;font-weight:800;color:var(--success-500);background:var(--neutral-000);padding:2px 8px;border-radius:var(--radius-xl)}
.tf-answer{margin-top:var(--space-xs);margin-left:28px;display:flex;gap:var(--space-xs)}
.tf-pill{padding:6px 18px;border-radius:var(--radius-xl);font-size:13px;font-weight:700;background:var(--bg-section-bar);color:var(--text-muted)}
.tf-pill.correct{background:#E8F5E9;color:var(--success-500)}
.blank-answer-tag{margin-top:6px;margin-left:28px;font-size:12px;color:var(--success-500);font-weight:800}
.answer-lines-container{margin-top:12px;margin-left:28px;padding-right:20px}
.answer-line{border:none;border-bottom:1px solid var(--border-input);margin-bottom:var(--space-m)}
.answer-line:last-child{margin-bottom:4px}
.reading-passage{margin:0 0 20px 0;padding:18px 22px;background:var(--yellow-100);border-left:3px solid var(--warning-300);border-radius:0 var(--radius-md) var(--radius-md) 0;font-size:14px;font-weight:500;line-height:1.75;color:var(--text-body);font-style:italic}
.answers-divider{font-size:14px;font-weight:800;color:var(--text-primary);margin-top:var(--space-m);margin-bottom:12px;padding-top:var(--space-s);border-top:1px solid var(--border-default)}
.answer-item{font-size:14px;font-weight:500;color:var(--text-body);margin-bottom:6px;margin-left:var(--space-s)}
.answer-item strong{color:var(--success-500);font-weight:800}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--neutral-900);color:var(--neutral-000);padding:10px 22px;border-radius:var(--radius-md);font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);z-index:999;transition:transform .3s ease;white-space:nowrap}
.toast.visible{transform:translateX(-50%) translateY(0)}
@media(max-width:640px){.page-container{padding:var(--space-s) 12px}.exam-meta-grid{grid-template-columns:1fr 1fr}.meta-cell:nth-child(2){border-right:none}.section-content{padding:18px var(--space-s)}.exam-details-row{flex-wrap:wrap;gap:12px;padding:12px var(--space-s)}.exam-instructions-bar{padding:12px var(--space-s)}.exam-header-top{padding:var(--space-s)}.mc-options-list{margin-left:12px}.answer-lines-container{margin-left:12px}.bottom-bar{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="page-container" id="app"></div>
<div class="toast" id="toast"></div>
<script>
const examData={
  "exam_title":"Evaluacion de Ciencias y Lectura",
  "subject":"Ciencia",
  "grade":"7mo grado",
  "topic":"Amazonia",
  "general_instructions":"Lee cuidadosamente cada pregunta y responde con claridad.",
  "sections":[
    {
      "section_title":"I. Comprension lectora",
      "section_instructions":"Lee el texto y responde.",
      "question_type":"reading_comprehension",
      "reading_passage":"La selva amazonica es una de las regiones con mayor biodiversidad del planeta. Ademas, ayuda a regular el clima al absorber dioxido de carbono y liberar oxigeno.",
      "questions":[
        {
          "question_number":1,
          "question_text":"Cual es una funcion clave de la selva amazonica?",
          "options":[
            {"letter":"a","text":"Producir plastico","is_correct":false},
            {"letter":"b","text":"Regular el clima","is_correct":true},
            {"letter":"c","text":"Crear desiertos","is_correct":false},
            {"letter":"d","text":"Construir ciudades","is_correct":false}
          ]
        },
        {
          "question_number":2,
          "question_text":"La selva libera oxigeno.",
          "correct_answer":true
        }
      ]
    },
    {
      "section_title":"II. Vocabulario y escritura",
      "section_instructions":"Completa y desarrolla.",
      "questions":[
        {
          "question_number":3,
          "question_text":"Las plantas absorben ______ dioxido del aire.",
          "correct_answer":"carbono"
        },
        {
          "question_number":4,
          "question_text":"Explica en 3-4 lineas por que es importante proteger los bosques.",
          "lines":5
        }
      ]
    }
  ]
};
const ic={info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'};

function safe(val, fallback){
if(val===undefined||val===null||val===''||val==='undefined'||val==='null')return fallback||'';
return val;}

function renderExamPreview(d){
const c=document.getElementById('app');
const tQ=d.sections.reduce((s,sec)=>s+sec.questions.length,0);
const subject=safe(d.subject,'Materia');
const grade=safe(d.grade,'Grado');
const topic=safe(d.topic,'');
const title=safe(d.exam_title, 'Evaluacion' + (topic?' - '+topic:''));

let h=`<div class="exam-header-card"><div class="exam-header-top"><div class="exam-title">${title}</div><div class="exam-subtitle">${subject} - ${grade}</div></div>
<div class="exam-meta-grid"><div class="meta-cell"><div class="meta-cell-label">Materia</div><div class="meta-cell-value">${subject}</div></div><div class="meta-cell"><div class="meta-cell-label">Grado</div><div class="meta-cell-value">${grade}</div></div><div class="meta-cell"><div class="meta-cell-label">Preguntas</div><div class="meta-cell-value">${tQ}</div></div><div class="meta-cell"><div class="meta-cell-label">Secciones</div><div class="meta-cell-value">${d.sections.length}</div></div></div>
<div class="exam-instructions-bar">${ic.info}<span><strong>Instrucciones:</strong> ${safe(d.general_instructions,'Lee cuidadosamente cada pregunta antes de responder.')}</span></div></div>`;

d.sections.forEach((sec,sIdx)=>{

if(!sec.question_type){
const q0=sec.questions[0];
if(sec.reading_passage) sec.question_type='reading_comprehension';
else if(q0&&q0.options&&(q0.correct_answer===true||q0.correct_answer===false)) sec.question_type='true_false';
else if(q0&&q0.options) sec.question_type='multiple_choice';
else if(q0&&typeof q0.correct_answer==='boolean') sec.question_type='true_false';
else if(q0&&typeof q0.correct_answer==='string') sec.question_type='fill_blank';
else if(q0&&q0.lines&&q0.lines>=6) sec.question_type='open_long';
else if(q0&&q0.lines) sec.question_type='open_short';
else sec.question_type='open_short';
}

h+=`<div class="section-card" id="section-${sIdx}"><div class="section-bar"><span>${sec.section_title} - ${sec.questions.length} preguntas</span></div>
<div class="section-content"><div class="section-title">${sec.section_title}</div><div class="section-instructions"><div class="section-instructions-label">Instrucciones</div><div class="section-instructions-text">${sec.section_instructions.replace(/\n/g,'<br>')}</div></div>${sec.reading_passage?'<div class="reading-passage">'+sec.reading_passage+'</div>':''}<div class="section-divider">Preguntas de ${sec.section_title.replace(/^[IVX]+\.\s*/,'').toLowerCase()}</div>`;

sec.questions.forEach((q,qIdx)=>{
let qType=sec.question_type;
if(sec.reading_passage||sec.question_type==='reading_comprehension'){
qType=q.options?'multiple_choice':q.lines?'open_short':'open_short';
}

const qId=`q-${sIdx}-${qIdx}`;
h+=`<div class="question-item" id="${qId}">
<div class="question-row"><span class="question-number-text">${q.question_number}.</span><span class="question-text" id="${qId}-text">${q.question_text}</span></div>`;

if(q.options){
h+='<div class="mc-options-list">';
q.options.forEach(o=>{h+=`<div class="mc-option-row ${o.is_correct?'correct':''}"><span class="mc-option-letter">${o.letter})</span><span>${o.text}</span>${o.is_correct?'<span class="mc-correct-tag">✓ Correcta</span>':''}</div>`;});
h+='</div>';}

else if(qType==='true_false'||typeof q.correct_answer==='boolean'){h+=`<div class="tf-answer"><span class="tf-pill ${q.correct_answer===true?'correct':''}">Verdadero</span><span class="tf-pill ${q.correct_answer===false?'correct':''}">Falso</span></div>`;}

else if(qType==='fill_blank'||(typeof q.correct_answer==='string'&&q.correct_answer)){h+=`<div class="blank-answer-tag">Respuesta: ${q.correct_answer}</div>`;}

else if(q.lines){h+='<div class="answer-lines-container">';for(let i=0;i<Math.min(q.lines,12);i++)h+='<hr class="answer-line">';h+='</div>';}

h+='</div>';});

const mcQs=sec.questions.filter(q=>q.options);
const tfQs=sec.questions.filter(q=>typeof q.correct_answer==='boolean'&&!q.options);
const fbQs=sec.questions.filter(q=>typeof q.correct_answer==='string'&&q.correct_answer);

if(mcQs.length>0||tfQs.length>0||fbQs.length>0){
h+='<div class="answers-divider">Respuestas correctas</div>';
mcQs.forEach(q=>{const co=q.options.find(o=>o.is_correct);if(co)h+=`<div class="answer-item">${q.question_number}. <strong>${co.letter}) ${co.text}</strong></div>`;});
tfQs.forEach(q=>{h+=`<div class="answer-item">${q.question_number}. <strong>${q.correct_answer?'Verdadero':'Falso'}</strong></div>`;});
fbQs.forEach(q=>{h+=`<div class="answer-item">${q.question_number}. <strong>${q.correct_answer}</strong></div>`;});
}

h+='</div></div>';});

c.innerHTML=h;}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('visible');setTimeout(()=>t.classList.remove('visible'),2200);}

renderExamPreview(examData);

function loadScript(url){
return new Promise((resolve,reject)=>{
if(document.querySelector(`script[src="${url}"]`)){resolve();return;}
const s=document.createElement('script');
s.src=url;s.onload=resolve;s.onerror=reject;
document.head.appendChild(s);});}

window.downloadPDF=async function(){
showToast('Generando PDF...');
await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js');

const d=examData;
const subject=safe(d.subject,'Materia');
const grade=safe(d.grade,'');
const topic=safe(d.topic,'');
const title=safe(d.exam_title,'Evaluacion'+(topic?' - '+topic:''));
const tQ=d.sections.reduce((s,sec)=>s+sec.questions.length,0);

let html=`<div style="font-family:Helvetica,Arial,sans-serif;color:#1F1F1F;padding:20px;max-width:780px;margin:0 auto;">`;
html+=`<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #FF6768;padding-bottom:8px;margin-bottom:16px;">
<div><span style="color:#FF6768;font-weight:bold;font-size:11px;">CALIFICA</span> <span style="color:#7D7D7D;font-size:10px;">| Evaluacion generada con IA</span></div>
</div>`;
html+=`<h1 style="font-size:18px;margin:0 0 4px 0;color:#1F1F1F;">${title}</h1>`;
html+=`<p style="font-size:11px;color:#7D7D7D;margin:0 0 12px 0;">${subject} - ${grade}</p>`;
html+=`<table style="width:100%;border-collapse:collapse;margin-bottom:10px;"><tr>`;
[{l:'MATERIA',v:subject},{l:'GRADO',v:grade},{l:'PREGUNTAS',v:tQ},{l:'SECCIONES',v:d.sections.length}].forEach(m=>{
html+=`<td style="background:#F5F3F0;border:1px solid #D9D9D9;text-align:center;padding:6px 8px;">
<div style="font-size:7px;color:#7D7D7D;font-weight:bold;letter-spacing:0.5px;">${m.l}</div>
<div style="font-size:11px;font-weight:bold;">${m.v}</div></td>`;});
html+=`</tr></table>`;

if(d.general_instructions){
html+=`<div style="background:#FFF0BF;border:1px solid #D9D9D9;padding:8px 12px;margin-bottom:10px;font-size:9px;color:#6D5D1B;">
<b>Instrucciones:</b> ${d.general_instructions}</div>`;}

html+=`<p style="font-size:10px;margin-bottom:4px;"><b>Nombre:</b> _______________________________________________&nbsp;&nbsp;&nbsp;&nbsp;<b>Fecha:</b> ________________</p>`;
html+=`<hr style="border:none;border-top:1px solid #D9D9D9;margin:8px 0 16px 0;">`;

d.sections.forEach(sec=>{
html+=`<h2 style="font-size:14px;color:#FF6768;margin:16px 0 4px 0;">${sec.section_title}</h2>`;
if(sec.section_instructions) html+=`<p style="font-size:9px;color:#7D7D7D;font-style:italic;margin:0 0 8px 0;">${sec.section_instructions}</p>`;
if(sec.reading_passage){
html+=`<div style="background:#FFF0BF;border-left:3px solid #FFBD2E;padding:10px 14px;margin:0 0 12px 0;font-size:10px;line-height:1.7;font-style:italic;color:#4C4C4C;">${sec.reading_passage}</div>`;}

sec.questions.forEach(q=>{
html+=`<p style="font-size:10px;margin:8px 0 3px 10px;"><b>${q.question_number}.</b> ${q.question_text}</p>`;
if(q.options){
q.options.forEach(o=>{
html+=`<p style="font-size:10px;margin:2px 0 2px 30px;color:#4C4C4C;"><span style="color:#7D7D7D;font-weight:bold;">${o.letter})</span> ${o.text}</p>`;});}
else if(typeof q.correct_answer==='boolean'){
html+=`<p style="font-size:10px;margin:3px 0 3px 30px;color:#7D7D7D;">(  V  )&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(  F  )</p>`;}
else if(q.lines){
for(let i=0;i<Math.min(q.lines,12);i++){
html+=`<div style="border-bottom:1px solid #D9D9D9;margin:14px 0 0 30px;width:85%;"></div>`;}}
});
});

html+=`<div style="page-break-before:always;"></div>`;
html+=`<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #FF6768;padding-bottom:8px;margin-bottom:16px;">
<div><span style="color:#FF6768;font-weight:bold;font-size:11px;">CALIFICA</span> <span style="color:#7D7D7D;font-size:10px;">| Clave de respuestas</span></div>
</div>`;
html+=`<h1 style="font-size:16px;margin:0 0 4px 0;">${title} - Respuestas</h1>`;
html+=`<p style="font-size:9px;color:#FF6768;font-style:italic;margin:0 0 14px 0;">Este documento es solo para uso del docente. No entregar a los estudiantes.</p>`;

const answers=[];
d.sections.forEach(sec=>{
sec.questions.forEach(q=>{
if(q.options){const c=q.options.find(o=>o.is_correct);if(c)answers.push({n:q.question_number,a:`${c.letter}) ${c.text}`});}
else if(typeof q.correct_answer==='boolean'){answers.push({n:q.question_number,a:q.correct_answer?'Verdadero':'Falso'});}
else if(typeof q.correct_answer==='string'&&q.correct_answer){answers.push({n:q.question_number,a:q.correct_answer});}
});});

if(answers.length>0){
html+=`<table style="width:100%;border-collapse:collapse;font-size:10px;">`;
html+=`<tr><th style="background:#FF6768;color:white;padding:5px 8px;border:1px solid #D9D9D9;width:50px;text-align:center;">#</th><th style="background:#FF6768;color:white;padding:5px 8px;border:1px solid #D9D9D9;text-align:left;">Respuesta correcta</th></tr>`;
answers.forEach((a,i)=>{
const bg=i%2===0?'#FFFFFF':'#F5F3F0';
html+=`<tr><td style="background:${bg};padding:4px 8px;border:1px solid #D9D9D9;text-align:center;font-weight:bold;">${a.n}</td><td style="background:${bg};padding:4px 8px;border:1px solid #D9D9D9;color:#0EA149;font-weight:bold;">${a.a}</td></tr>`;});
html+=`</table>`;}

const openQs=d.sections.flatMap(s=>s.questions).filter(q=>q.lines&&!q.options&&q.correct_answer===undefined);
if(openQs.length>0){
html+=`<p style="font-size:10px;font-weight:bold;margin:16px 0 6px 0;">Preguntas abiertas (evaluacion a criterio del docente):</p>`;
openQs.forEach(q=>{html+=`<p style="font-size:9px;color:#7D7D7D;margin:2px 0 2px 10px;"><b>${q.question_number}.</b> ${q.question_text}</p>`;});}

html+=`<p style="text-align:center;font-size:7px;color:#7D7D7D;margin-top:20px;">Generado con Califica - califica.ai</p>`;
html+=`</div>`;

const container=document.createElement('div');
container.innerHTML=html;
container.style.position='absolute';
container.style.left='-9999px';
document.body.appendChild(container);

const filename=title.replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ\s\-]/g,'').replace(/\s+/g,'_')+'.pdf';

html2pdf().set({
margin:[0.4,0.5,0.4,0.5],
filename:filename,
image:{type:'jpeg',quality:0.95},
html2canvas:{scale:2,useCORS:true,letterRendering:true},
jsPDF:{unit:'in',format:'letter',orientation:'portrait'},
pagebreak:{mode:['css','legacy']}
}).from(container).save().then(()=>{
document.body.removeChild(container);
showToast('PDF descargado');
}).catch(e=>{
document.body.removeChild(container);
showToast('Error al generar PDF');
console.error(e);});
};

window.downloadDOCX=async function(){
showToast('Generando Word...');
await loadScript('https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.min.js');
await loadScript('https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js');

const{Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,Header,Footer,AlignmentType,BorderStyle,WidthType,ShadingType,PageBreak}=docx;

const d=examData;
const subject=safe(d.subject,'Evaluacion');
const grade=safe(d.grade,'');
const topic=safe(d.topic,'');
const title=safe(d.exam_title,'Evaluacion'+(topic?' - '+topic:''));
const tQ=d.sections.reduce((s,sec)=>s+sec.questions.length,0);

const CORAL='FF6768',GRAY_BG='F5F3F0',GRAY_BD='D9D9D9',GRAY_TX='7D7D7D',BLK='1F1F1F',GRN='0EA149',YEL='FFF0BF',WHT='FFFFFF';
const tb={style:BorderStyle.SINGLE,size:1,color:GRAY_BD};
const tbs={top:tb,bottom:tb,left:tb,right:tb};
const nb={style:BorderStyle.NONE,size:0};
const nbs={top:nb,bottom:nb,left:nb,right:nb};

const children=[];
children.push(new Paragraph({spacing:{after:60},children:[
new TextRun({text:'CALIFICA',font:'Arial',size:18,bold:true,color:CORAL}),
new TextRun({text:'  |  Evaluacion generada con IA',font:'Arial',size:16,color:GRAY_TX})]}));
children.push(new Paragraph({border:{bottom:{style:BorderStyle.SINGLE,size:6,color:CORAL,space:1}},spacing:{after:200},children:[]}));
children.push(new Paragraph({spacing:{after:80},children:[new TextRun({text:title,font:'Arial',size:28,bold:true,color:BLK})]}));

const metaItems=[{l:'MATERIA',v:subject},{l:'GRADO',v:grade},{l:'PREGUNTAS',v:String(tQ)},{l:'SECCIONES',v:String(d.sections.length)}];
const mw=Math.floor(9360/4);
children.push(new Table({width:{size:9360,type:WidthType.DXA},columnWidths:[mw,mw,mw,mw],
rows:[new TableRow({children:metaItems.map(m=>new TableCell({borders:tbs,shading:{fill:GRAY_BG,type:ShadingType.CLEAR},width:{size:mw,type:WidthType.DXA},margins:{top:60,bottom:60,left:100,right:100},
children:[new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:40},children:[new TextRun({text:m.l,font:'Arial',size:14,bold:true,color:GRAY_TX})]}),
new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:m.v,font:'Arial',size:20,bold:true,color:BLK})]})]}))})]}));

children.push(new Paragraph({spacing:{after:120},children:[]}));

if(d.general_instructions){
children.push(new Table({width:{size:9360,type:WidthType.DXA},columnWidths:[9360],
rows:[new TableRow({children:[new TableCell({borders:tbs,shading:{fill:YEL,type:ShadingType.CLEAR},width:{size:9360,type:WidthType.DXA},margins:{top:80,bottom:80,left:140,right:140},
children:[new Paragraph({children:[new TextRun({text:'Instrucciones: ',font:'Arial',size:20,bold:true,color:'6D5D1B'}),new TextRun({text:d.general_instructions,font:'Arial',size:20,color:'6D5D1B'})]})]})]})]
}));
children.push(new Paragraph({spacing:{after:200},children:[]}));}

children.push(new Paragraph({spacing:{after:60},children:[
new TextRun({text:'Nombre: ',font:'Arial',size:20,bold:true,color:BLK}),
new TextRun({text:'_______________________________________________   ',font:'Arial',size:20,color:GRAY_BD}),
new TextRun({text:'Fecha: ',font:'Arial',size:20,bold:true,color:BLK}),
new TextRun({text:'________________',font:'Arial',size:20,color:GRAY_BD})]}));
children.push(new Paragraph({border:{bottom:{style:BorderStyle.SINGLE,size:2,color:GRAY_BD,space:1}},spacing:{after:300},children:[]}));

const answerKey=[];

d.sections.forEach((sec,sIdx)=>{
if(!sec.question_type){const q0=sec.questions[0];
if(sec.reading_passage)sec.question_type='reading_comprehension';
else if(q0&&q0.options&&typeof q0.correct_answer==='boolean')sec.question_type='true_false';
else if(q0&&q0.options)sec.question_type='multiple_choice';
else if(q0&&typeof q0.correct_answer==='boolean')sec.question_type='true_false';
else if(q0&&typeof q0.correct_answer==='string')sec.question_type='fill_blank';
else if(q0&&q0.lines&&q0.lines>=6)sec.question_type='open_long';
else sec.question_type='open_short';}

children.push(new Paragraph({spacing:{before:sIdx>0?300:0,after:100},children:[new TextRun({text:sec.section_title,font:'Arial',size:24,bold:true,color:CORAL})]}));
if(sec.section_instructions)children.push(new Paragraph({spacing:{after:120},children:[new TextRun({text:sec.section_instructions,font:'Arial',size:20,italics:true,color:GRAY_TX})]}));

if(sec.reading_passage){
children.push(new Table({width:{size:9360,type:WidthType.DXA},columnWidths:[9360],
rows:[new TableRow({children:[new TableCell({borders:{top:tb,bottom:tb,right:tb,left:{style:BorderStyle.SINGLE,size:6,color:'FFBD2E'}},shading:{fill:YEL,type:ShadingType.CLEAR},width:{size:9360,type:WidthType.DXA},margins:{top:100,bottom:100,left:160,right:160},
children:[new Paragraph({spacing:{line:360},children:[new TextRun({text:sec.reading_passage,font:'Arial',size:20,italics:true,color:'4C4C4C'})]})]})]})]
}));
children.push(new Paragraph({spacing:{after:200},children:[]}));}

sec.questions.forEach(q=>{
children.push(new Paragraph({spacing:{before:120,after:60},indent:{left:200},children:[
new TextRun({text:`${q.question_number}. `,font:'Arial',size:20,bold:true,color:BLK}),
new TextRun({text:q.question_text,font:'Arial',size:20,color:BLK})]}));

if(q.options){
q.options.forEach(o=>{children.push(new Paragraph({spacing:{after:40},indent:{left:600},children:[
new TextRun({text:`${o.letter}) `,font:'Arial',size:20,bold:true,color:GRAY_TX}),
new TextRun({text:o.text,font:'Arial',size:20,color:BLK})]}));});
const co=q.options.find(o=>o.is_correct);
if(co)answerKey.push({n:q.question_number,a:`${co.letter}) ${co.text}`});}

else if(typeof q.correct_answer==='boolean'){
children.push(new Paragraph({spacing:{after:40},indent:{left:600},children:[
new TextRun({text:'(  V  )     (  F  )',font:'Arial',size:20,color:GRAY_TX})]}));
answerKey.push({n:q.question_number,a:q.correct_answer?'Verdadero':'Falso'});}

else if(typeof q.correct_answer==='string'&&q.correct_answer){
answerKey.push({n:q.question_number,a:q.correct_answer});}

else if(q.lines){for(let i=0;i<Math.min(q.lines,12);i++){
children.push(new Paragraph({spacing:{before:200},indent:{left:600},border:{bottom:{style:BorderStyle.SINGLE,size:1,color:GRAY_BD,space:1}},children:[new TextRun({text:' ',font:'Arial',size:20})]}));}}
});
});

children.push(new Paragraph({children:[new PageBreak()]}));
children.push(new Paragraph({spacing:{after:60},children:[
new TextRun({text:'CALIFICA',font:'Arial',size:18,bold:true,color:CORAL}),
new TextRun({text:'  |  Clave de respuestas',font:'Arial',size:16,color:GRAY_TX})]}));
children.push(new Paragraph({border:{bottom:{style:BorderStyle.SINGLE,size:6,color:CORAL,space:1}},spacing:{after:200},children:[]}));
children.push(new Paragraph({spacing:{after:120},children:[new TextRun({text:title+' - Respuestas',font:'Arial',size:26,bold:true,color:BLK})]}));
children.push(new Paragraph({spacing:{after:200},children:[new TextRun({text:'Este documento es solo para uso del docente. No entregar a los estudiantes.',font:'Arial',size:18,italics:true,color:CORAL})]}));

if(answerKey.length>0){
const hdrRow=new TableRow({children:[
new TableCell({borders:tbs,shading:{fill:CORAL,type:ShadingType.CLEAR},width:{size:1400,type:WidthType.DXA},margins:{top:60,bottom:60,left:100,right:100},
children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:'#',font:'Arial',size:18,bold:true,color:WHT})]})]}),
new TableCell({borders:tbs,shading:{fill:CORAL,type:ShadingType.CLEAR},width:{size:7960,type:WidthType.DXA},margins:{top:60,bottom:60,left:100,right:100},
children:[new Paragraph({children:[new TextRun({text:'Respuesta correcta',font:'Arial',size:18,bold:true,color:WHT})]})]})
]});
const aRows=answerKey.map((a,i)=>{const bg=i%2===0?WHT:GRAY_BG;
return new TableRow({children:[
new TableCell({borders:tbs,shading:{fill:bg,type:ShadingType.CLEAR},width:{size:1400,type:WidthType.DXA},margins:{top:50,bottom:50,left:100,right:100},
children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:String(a.n),font:'Arial',size:20,bold:true,color:BLK})]})]}),
new TableCell({borders:tbs,shading:{fill:bg,type:ShadingType.CLEAR},width:{size:7960,type:WidthType.DXA},margins:{top:50,bottom:50,left:100,right:100},
children:[new Paragraph({children:[new TextRun({text:a.a,font:'Arial',size:20,bold:true,color:GRN})]})]})
]});});
children.push(new Table({width:{size:9360,type:WidthType.DXA},columnWidths:[1400,7960],rows:[hdrRow,...aRows]}));}

const footerP=new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:'Generado con Califica - califica.ai',font:'Arial',size:14,color:GRAY_TX})]});

const doc=new Document({styles:{default:{document:{run:{font:'Arial',size:20}}}},
sections:[{properties:{page:{size:{width:12240,height:15840},margin:{top:1080,right:1440,bottom:1080,left:1440}}},
footers:{default:new Footer({children:[footerP]})},children}]});

const filename=title.replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ\s\-]/g,'').replace(/\s+/g,'_')+'.docx';

Packer.toBlob(doc).then(blob=>{
saveAs(blob,filename);
showToast('Word descargado');
}).catch(e=>{showToast('Error al generar Word');console.error(e);});
};
</script>
